<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Three.js Lab 10</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #1a1a1a; color: #eee; overflow: hidden; }
  #nav {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    display: flex; gap: 6px; flex-wrap: wrap;
    background: rgba(0,0,0,0.5); padding: 8px; border-radius: 6px;
    backdrop-filter: blur(8px);
  }
  #nav button {
    padding: 8px 14px; background: #2a2a2a; color: #eee;
    border: 1px solid #444; cursor: pointer; border-radius: 4px;
    font-size: 13px;
  }
  #nav button:hover { background: #3a3a3a; border-color: #666; }
  #nav button.active { background: #e8430a; border-color: #e8430a; color: #fff; font-weight: 600; }
  canvas { display: block; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="nav">
  <button data-demo="ubb" class="active">1</button>
  <button data-demo="surface">2</button>
  <button data-demo="tube">3</button>
  <button data-demo="lathe">4</button>
  <button data-demo="model">5</button>
  <button data-demo="rook">6</button>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { ParametricGeometry } from 'three/addons/geometries/ParametricGeometry.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const MODEL_URL = 'model.glb';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(
  50, window.innerWidth / window.innerHeight, 0.1, 1000
);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

let scene = new THREE.Scene();

function setupLights(s) {
  s.add(new THREE.AmbientLight(0xffffff, 0.35));
  const key = new THREE.DirectionalLight(0xffffff, 1.2);
  key.position.set(10, 20, 15);
  s.add(key);
  const fill = new THREE.DirectionalLight(0xffffff, 0.5);
  fill.position.set(-10, 5, -10);
  s.add(fill);
}

function buildLetterBars(bars, depth = 0.4) {
  const positions = [];
  const indices = [];
  bars.forEach(([x, y, w, h]) => {
    const base = positions.length / 3;
    const x0 = x, x1 = x + w, y0 = y, y1 = y + h, z0 = 0, z1 = depth;
    positions.push(
      x0, y0, z1,  x1, y0, z1,  x1, y1, z1,  x0, y1, z1,
      x0, y0, z0,  x1, y0, z0,  x1, y1, z0,  x0, y1, z0
    );
    indices.push(
      base+0, base+1, base+2,  base+0, base+2, base+3,
      base+5, base+4, base+7,  base+5, base+7, base+6,
      base+3, base+2, base+6,  base+3, base+6, base+7,
      base+4, base+5, base+1,  base+4, base+1, base+0,
      base+1, base+5, base+6,  base+1, base+6, base+2,
      base+4, base+0, base+3,  base+4, base+3, base+7
    );
  });
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position',
    new THREE.BufferAttribute(new Float32Array(positions), 3));
  geom.setIndex(indices);
  geom.computeVertexNormals();
  return geom;
}

function buildUBB() {
  const s = new THREE.Scene();
  s.background = new THREE.Color(0x1a1a1a);
  setupLights(s);

  const U = buildLetterBars([
    [0.0, 1.0, 0.7, 4.0],
    [2.3, 1.0, 0.7, 4.0],
    [0.0, 0.0, 3.0, 1.0],
  ]);

  const B = buildLetterBars([
    [0.0, 0.0, 0.7, 5.0],
    [0.0, 4.3, 2.4, 0.7],
    [0.0, 2.15, 2.4, 0.7],
    [0.0, 0.0, 2.4, 0.7],
    [2.3, 2.85, 0.7, 1.45],
    [2.3, 0.7, 0.7, 1.45],
  ]);

  const material = new THREE.MeshStandardMaterial({
    color: 0xe8430a, metalness: 0.2, roughness: 0.45
  });

  const group = new THREE.Group();
  const letterSpacing = 4.0;
  const u  = new THREE.Mesh(U, material);  u.position.x  = 0;
  const b1 = new THREE.Mesh(B, material);  b1.position.x = letterSpacing;
  const b2 = new THREE.Mesh(B, material);  b2.position.x = 2 * letterSpacing;
  group.add(u, b1, b2);
  const totalWidth = 2 * letterSpacing + 3;
  group.position.x = -totalWidth / 2;
  group.position.y = -2.5;
  s.add(group);

  const wire = new THREE.Group();
  [U, B, B].forEach((g, i) => {
    const wf = new THREE.LineSegments(
      new THREE.WireframeGeometry(g),
      new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 })
    );
    wf.position.x = i * letterSpacing;
    wire.add(wf);
  });
  wire.position.copy(group.position);
  s.add(wire);

  return s;
}

function buildSurface() {
  const s = new THREE.Scene();
  s.background = new THREE.Color(0x1a1a1a);
  setupLights(s);

  function surfaceFunction(u, v, target) {
    const x = 20 * (u - 0.5);
    const z = 20 * (v - 0.5);
    const y = 2 * Math.sin(x / 2) * Math.cos(z);
    target.set(x, y, z);
  }

  const geom = new ParametricGeometry(surfaceFunction, 80, 80);

  const surface = new THREE.Mesh(
    geom,
    new THREE.MeshStandardMaterial({
      color: 0xe8430a, side: THREE.DoubleSide,
      metalness: 0.1, roughness: 0.55
    })
  );
  s.add(surface);

  const wire = new THREE.LineSegments(
    new THREE.WireframeGeometry(geom),
    new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25 })
  );
  s.add(wire);

  s.add(new THREE.AxesHelper(12));

  return s;
}

class Helix extends THREE.Curve {
  getPoint(t, target = new THREE.Vector3()) {
    const s = (t - 0.5) * 12 * Math.PI;
    return target.set(
      5 * Math.cos(s),
      s,
      5 * Math.sin(s)
    );
  }
}

function buildTube() {
  const s = new THREE.Scene();
  s.background = new THREE.Color(0x1a1a1a);
  setupLights(s);

  const helix = new Helix();
  const mat = new THREE.MeshStandardMaterial({
    color: 0xcccccc, metalness: 0.35, roughness: 0.4
  });

  const thin = new THREE.Mesh(
    new THREE.TubeGeometry(helix, 256, 1.0, 16),
    mat
  );
  thin.position.x = -15;
  s.add(thin);

  const thick = new THREE.Mesh(
    new THREE.TubeGeometry(helix, 128, 2.5, 32),
    mat
  );
  thick.position.x = 15;
  s.add(thick);

  const curvePoints = helix.getPoints(400);
  const curveLine = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(curvePoints),
    new THREE.LineBasicMaterial({ color: 0xe8430a })
  );
  s.add(curveLine);

  return s;
}

function buildLathe() {
  const s = new THREE.Scene();
  s.background = new THREE.Color(0x1a1a1a);
  setupLights(s);

  const points = [];
  const N = 64;
  for (let i = 0; i <= N; i++) {
    const y = (i / N) * 20 - 10;
    const x = 3 + 2 * Math.cos(y * 0.9);
    points.push(new THREE.Vector2(x, y));
  }

  const geom = new THREE.LatheGeometry(points, 64);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xcccccc, metalness: 0.25, roughness: 0.5,
    side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(geom, mat);
  s.add(mesh);

  const curve3D = points.map(p => new THREE.Vector3(p.x, p.y, 0));
  const curveLine = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(curve3D),
    new THREE.LineBasicMaterial({ color: 0xe8430a })
  );
  curveLine.position.x = 7;
  s.add(curveLine);

  return s;
}

function buildModel() {
  const s = new THREE.Scene();
  s.background = new THREE.Color(0x1a1a1a);
  setupLights(s);

  const placeholder = new THREE.Mesh(
    new THREE.BoxGeometry(2, 2, 2),
    new THREE.MeshStandardMaterial({
      color: 0x666666, wireframe: true
    })
  );
  s.add(placeholder);

  const loader = new GLTFLoader();
  loader.load(
    MODEL_URL,
    (gltf) => {
      s.remove(placeholder);
      s.add(gltf.scene);

      const box = new THREE.Box3().setFromObject(gltf.scene);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      gltf.scene.position.sub(center);
      const maxDim = Math.max(size.x, size.y, size.z);
      const dist = maxDim * 2;
      camera.position.set(dist, dist * 0.6, dist);
      controls.target.set(0, 0, 0);
      controls.update();
    },
    undefined,
    (err) => console.error(err)
  );

  return s;
}

function buildRook() {
  const s = new THREE.Scene();
  s.background = new THREE.Color(0xD3D3D3);
  setupLights(s);

  const points = [];
  points.push(new THREE.Vector2(0.0, 0.0)); 
  points.push(new THREE.Vector2(1.5, 0.0)); 
  points.push(new THREE.Vector2(1.4, 0.4)); 
  points.push(new THREE.Vector2(1.0, 0.8)); 
  points.push(new THREE.Vector2(0.8, 2.5)); 
  points.push(new THREE.Vector2(1.2, 2.8)); 
  points.push(new THREE.Vector2(1.3, 3.2)); 
  points.push(new THREE.Vector2(1.3, 4.0)); 
  points.push(new THREE.Vector2(0.0, 4.0)); 

  const geom = new THREE.LatheGeometry(points, 32);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x111111, 
    metalness: 0.2, 
    roughness: 0.5,
    side: THREE.DoubleSide 
  });
  const rookMesh = new THREE.Mesh(geom, mat);

  s.add(rookMesh);
  
  return s;
}

const demos = {
  ubb:     { build: buildUBB,     cam: [0, 2, 16],   target: [0, 0, 0] },
  surface: { build: buildSurface, cam: [18, 14, 18], target: [0, 0, 0] },
  tube:    { build: buildTube,    cam: [0, 0, 50],   target: [0, 0, 0] },
  lathe:   { build: buildLathe,   cam: [18, 0, 25],  target: [0, 0, 0] },
  model:   { build: buildModel,   cam: [0, 2, 8],    target: [0, 0, 0] },
  rook:    { build: buildRook,    cam: [0, 3, 12],   target: [0, 2, 0] },
};

function loadDemo(name) {
  if (scene) {
    scene.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
        else obj.material.dispose();
      }
    });
  }
  const d = demos[name];
  scene = d.build();
  camera.position.set(...d.cam);
  controls.target.set(...d.target);
  controls.update();
}

document.querySelectorAll('#nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadDemo(btn.dataset.demo);
  });
});

loadDemo('ubb');

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
