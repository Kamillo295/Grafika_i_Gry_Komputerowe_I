<?xml version="1.0"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN"
  "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">

<svg version="1.1" xmlns="http://www.w3.org/2000/svg"
     width="800px" height="500px"
     viewBox="0 0 800 500" preserveAspectRatio="xMidYMid">

  <rect width="100%" height="100%" fill="#111111" />
  <g stroke="#555555" stroke-linecap="round">

    <line y1="120" y2="120" stroke-width="4">
      <animate attributeName="x1" from="900" to="-150" dur="1.2s" repeatCount="indefinite" />
      <animate attributeName="x2" from="1050" to="0" dur="1.2s" repeatCount="indefinite" />
    </line>

    <line y1="210" y2="210" stroke-width="2">
      <animate attributeName="x1" from="850" to="-200" dur="0.6s" repeatCount="indefinite" />
      <animate attributeName="x2" from="950" to="-100" dur="0.6s" repeatCount="indefinite" />
    </line>

    <line y1="420" y2="420" stroke-width="5">
      <animate attributeName="x1" from="1000" to="-100" dur="0.9s" repeatCount="indefinite" />
      <animate attributeName="x2" from="1150" to="50" dur="0.9s" repeatCount="indefinite" />
    </line>
  </g>

  <g id="pojazd">

    <circle cx="280" cy="330" r="60" fill="none" stroke="#3a3a3a" stroke-width="35" />
    <circle cx="520" cy="330" r="60" fill="none" stroke="#3a3a3a" stroke-width="35" />
    <rect x="230" y="240" width="310" height="55" rx="15" ry="15" fill="#3a3a3a" />

    <path d="M 500 240 L 460 170 L 440 190"
          fill="none" stroke="#3a3a3a" stroke-width="12"
          stroke-linecap="round" stroke-linejoin="round" />

    <line x1="460" y1="170" x2="510" y2="170"
          stroke="#3a3a3a" stroke-width="10"
          stroke-linecap="round" />
  </g>

  <g stroke="#777777" stroke-linecap="round">
    <line y1="380" y2="380" stroke-width="3">
      <animate attributeName="x1" from="1200" to="-100" dur="0.5s" repeatCount="indefinite" />
      <animate attributeName="x2" from="1350" to="50" dur="0.5s" repeatCount="indefinite" />
    </line>
  </g>

</svg>