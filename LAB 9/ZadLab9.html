<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raymarching Simple</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }

  /* dodany panel na przyciski */
  #controls {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 10;
    display: flex;
    gap: 8px;
  }

  /* prosty wyglad przyciskow */
  button {
    padding: 8px 12px;
    border: 1px solid #444;
    background: #111;
    color: white;
    cursor: pointer;
  }
</style>
</head>
<body>
<!-- przyciski do wyboru operacji SDF -->
<div id="controls">
  <button id="unionBtn">Suma</button>
  <button id="intersectionBtn">Przeciecie</button>
  <button id="differenceBtn">Roznica</button>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const vertexShader = `
void main() {
  gl_Position = vec4(position, 1.0);
}
`;

const fragmentShader = `
uniform vec2 u_resolution;
uniform float u_time;
uniform int u_operation;

#define MAX_STEPS 100
#define MAX_DIST  100.0
#define SURF_DIST 0.001

float sdSphere(vec3 p, float r) {
  return length(p) - r;
}

float sdBox(vec3 p, vec3 b) {
  vec3 q = abs(p) - b;
  return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0);
}

float sdTriPrism(vec3 p, vec2 h) {
  vec3 q = abs(p);
  return max(q.z - h.y, max(q.x * 0.866025 + p.y * 0.5, -p.y) - h.x * 0.5);
}

float sdTorus(vec3 p, vec2 t) {
  vec2 q = vec2(length(p.xz) - t.x, p.y);
  return length(q) - t.y;
}

// funkcja do obrotu prostokata
vec2 rotate2D(vec2 p, float a) {
  float s = sin(a);
  float c = cos(a);
  return vec2(c * p.x - s * p.y, s * p.x + c * p.y);
}

// scena zostala uproszczona do kola i prostokata.
vec2 scene(vec3 p) {
  vec2 q = p.xy;

  // animowana pozycja kola.
  vec2 circlePos = vec2(0.45 * sin(u_time), 0.25 * cos(u_time * 1.3));
  float circle = sdSphere(vec3(q - circlePos, 0.0), 0.35);

  // obrot i zmiana szerokosci prostokata.
  vec2 boxP = rotate2D(q, u_time);
  vec3 boxSize = vec3(0.45 + 0.15 * sin(u_time * 1.7), 0.22, 0.2);
  float box = sdBox(vec3(boxP, 0.0), boxSize);

  float d = circle;

  // wybor operacji na dwoch SDF-ach.
  if (u_operation == 0) {
    d = min(circle, box);
  } else if (u_operation == 1) {
    d = max(circle, box);
  } else {
    d = max(circle, -box);
  }

  return vec2(d, 0.0);
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.001, 0.0);
  return normalize(vec3(
    scene(p + e.xyy).x - scene(p - e.xyy).x,
    scene(p + e.yxy).x - scene(p - e.yxy).x,
    scene(p + e.yyx).x - scene(p - e.yyx).x
  ));
}

vec2 rayMarch(vec3 ro, vec3 rd) {
  float d = 0.0;
  float id = -1.0;
  for (int i = 0; i < MAX_STEPS; i++) {
    vec3 p = ro + rd * d;
    vec2 hit = scene(p);
    if (hit.x < SURF_DIST) { id = hit.y; break; }
    if (d > MAX_DIST) break;
    d += hit.x;
  }
  return vec2(d, id);
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution) / u_resolution.y;

  // zamiast raymarchingu 3D robimy SDF w 2D
  float d = scene(vec3(uv, 0.0)).x;

  vec3 col = vec3(0.05, 0.05, 0.1);

  // wnetrze wyniku SDF ma inny kolor niz tlo
  if (d < 0.0) {
    col = vec3(0.2, 0.6, 1.0);
  }

  col = pow(col, vec3(0.4545));
  gl_FragColor = vec4(col, 1.0);
}
`;

const geometry = new THREE.PlaneGeometry(2, 2);
const material = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms: {
    u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    u_time: { value: 0.0 },
    u_operation: { value: 0 }
  }
});

scene.add(new THREE.Mesh(geometry, material));

// suma
document.getElementById('unionBtn').addEventListener('click', () => {
  material.uniforms.u_operation.value = 0;
});

// przeciecie
document.getElementById('intersectionBtn').addEventListener('click', () => {
  material.uniforms.u_operation.value = 1;
});

// roznica
document.getElementById('differenceBtn').addEventListener('click', () => {
  material.uniforms.u_operation.value = 2;
});

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  material.uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  material.uniforms.u_time.value = clock.getElapsedTime();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
